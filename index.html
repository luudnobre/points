<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Separador de Pontos RH</title>
  <link rel="stylesheet" href="style.css" />

  <!-- PDF.js versão mais estável para uso direto em script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- PDF-LIB -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="card hero-card">
      <p class="eyebrow">RH • Separador inteligente</p>
      <h1>Separar PDF por nomes</h1>
      <p class="subtitle">
        Faça upload do PDF completo e informe os nomes que deseja extrair.
      </p>
    </section>

    <section class="card grid-two">
      <div class="panel">
        <label class="label" for="pdfFile">Selecionar PDF</label>

        <div class="upload-box">
          <input id="pdfFile" type="file" accept=".pdf,application/pdf" />
          <button id="pickFileBtn" type="button" class="primary-btn">
            Escolher PDF
          </button>
          <p class="upload-hint">Funciona melhor em Chrome, Edge ou Safari recente.</p>
        </div>

        <div class="file-preview" id="filePreview">Nenhum arquivo selecionado</div>
      </div>

      <div class="panel">
        <label class="label" for="namesInput">Nomes</label>
        <textarea
          id="namesInput"
          rows="10"
          placeholder="Um nome por linha&#10;Exemplo:&#10;Maria Silva&#10;João Pedro"
        ></textarea>
      </div>
    </section>

    <section class="card">
      <div class="actions-wrap">
        <button class="primary-btn" id="processBtn" type="button">Separar PDFs</button>
        <button class="secondary-btn" id="resetBtn" type="button">Limpar</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText">Aguardando ação</p>
      </div>
    </section>

    <section class="card">
      <h2>Resultados</h2>
      <div id="resultsList" class="results-list">
        <p class="empty-state">Os PDFs separados aparecerão aqui.</p>
      </div>
    </section>

    <section class="card">
      <h2>Log</h2>
      <div id="logBox" class="log-box"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
